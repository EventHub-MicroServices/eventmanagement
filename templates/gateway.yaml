{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.gateway.namespace }}
{{- end }}
---
{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: event-gateway
  namespace: {{ .Values.gateway.namespace }}
  annotations:
    # Provision a cloud load balancer for external traffic
    networking.istio.io/service-type: LoadBalancer
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
{{- end }}
---
{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: users-route
  namespace: {{ .Values.gateway.namespace }}
spec:
  parentRefs:
    - name: event-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/users
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: users-service
          namespace: {{ .Values.global.namespace }}
          port: {{ .Values.users.service.port }}
{{- end }}
---
{{- if .Values.gateway.enabled }}
