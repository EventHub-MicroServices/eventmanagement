{{- if .Values.payment.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-config
  namespace: {{ .Values.global.namespace }}
data:
  NODE_ENV: {{ .Values.payment.config.NODE_ENV | quote }}
  PORT: {{ .Values.payment.config.PORT | quote }}
{{- end }}
---
{{- if .Values.payment.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: payment-secret
  namespace: {{ .Values.global.namespace }}
type: Opaque
data:
  STRIPE_API_KEY: {{ .Values.payment.secrets.STRIPE_API_KEY | b64enc }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.payment.secrets.STRIPE_WEBHOOK_SECRET | b64enc }}
{{- end }}
---
{{- if .Values.payment.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: payment-service
spec:
  selector:
    app: payment-service
  ports:
    - port: {{ .Values.payment.service.port }}
      targetPort: {{ .Values.payment.service.targetPort }}
      protocol: TCP
  type: {{ .Values.payment.service.type }}
{{- end }}
---
{{- if .Values.payment.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-deployment
  namespace: {{ .Values.global.namespace }}
  labels:
    app: payment-service
spec:
  replicas: {{ .Values.payment.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: "{{ .Values.payment.image.repository }}:{{ .Values.payment.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.payment.service.targetPort }}
          envFrom:
            - configMapRef:
                name: payment-config
            - secretRef:
                name: payment-secret
          resources:
            requests:
              cpu: {{ .Values.payment.resources.requests.cpu | quote }}
              memory: {{ .Values.payment.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.payment.resources.limits.cpu | quote }}
              memory: {{ .Values.payment.resources.limits.memory | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.payment.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.payment.service.targetPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
{{- end }}
