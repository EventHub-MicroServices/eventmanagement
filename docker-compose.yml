version: '3.8'

services:
  postgres-db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d users_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  events-db:
    image: mongo:6.0
    env_file:
      - .env
    volumes:
      - events_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 5

  notification-redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    env_file:
      - .env
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  users-service:
    build: ./users-service
    ports:
      - "8001:8001"
    env_file:
      - ./users-service/.env
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8001/\")'" ]
      interval: 10s
      timeout: 5s
      retries: 5

  events-service:
    build: ./events-service
    ports:
      - "8002:8002"
    env_file:
      - ./events-service/.env
    depends_on:
      events-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8002/\")'" ]
      interval: 10s
      timeout: 5s
      retries: 5

  booking-service:
    build: ./booking-service
    ports:
      - "8003:8003"
    env_file:
      - ./booking-service/.env
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8003/\")'" ]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build: ./payment-service
    ports:
      - "8004:8004"
    env_file:
      - ./payment-service/.env
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8004/\")'" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ticket-service:
    build: ./ticket-service
    ports:
      - "8005:8005"
    env_file:
      - ./ticket-service/.env
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8005/\")'" ]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build: ./notification-service
    ports:
      - "8006:8006"
    env_file:
      - ./notification-service/.env
    depends_on:
      notification-redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8006/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build: ./ai-service
    ports:
      - "8007:8007"
    env_file:
      - ./ai-service/.env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8007/" ]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-service:
    build: ./admin-service
    ports:
      - "8008:8008"
    env_file:
      - ./admin-service/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8008/\")'" ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  events_data:
