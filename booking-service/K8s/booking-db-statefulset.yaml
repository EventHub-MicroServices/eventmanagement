apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: booking-db
spec:
  serviceName: booking-db
  replicas: 1
  minReadySeconds: 10
  selector:
    matchLabels:
      app: booking-db
  template:
    metadata:
      labels:
        app: booking-db
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DB
              value: booking_db
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: booking-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: booking-secret
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: booking-db-storage
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: booking-db-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi